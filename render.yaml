services:
  - type: web
    name: ktalk-ai
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: FRONTEND_URL
        value: ""
      - key: DB_HOST
        fromDatabase:
          name: ktalk-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ktalk-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ktalk-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ktalk-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ktalk-db
          property: password
      - key: NAVER_CLOVA_CLIENT_ID
        sync: false
      - key: NAVER_CLOVA_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: ktalk-db
    plan: free
    databaseName: ktalk
    user: ktalk
