services:
  - type: web
    name: ktalk-ai
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: FRONTEND_URL
        value: ""
      - key: DB_HOST
        fromDatabase:
          name: ktalk-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ktalk-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ktalk-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ktalk-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ktalk-db
          property: password
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: GOOGLE_TTS_LANGUAGE
        value: ko-KR
      - key: GOOGLE_TTS_FEMALE_VOICE
        value: ko-KR-Chirp3-HD-Zephyr
      - key: GOOGLE_TTS_MALE_VOICE
        value: ko-KR-Chirp3-HD-Rasalgethi
      - key: GOOGLE_TTS_MAX_CONCURRENT_REQUESTS
        value: "8"
      - key: GOOGLE_TTS_QUEUE_TIMEOUT_SECONDS
        value: "60"
      - key: TTS_USER_REQUESTS_PER_MINUTE
        value: "6"
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_BUSINESS_PRICE_ID
        sync: false
      - key: BILLING_PRO_MONTHLY_PRICE_USD
        value: "9.90"
      - key: BILLING_BUSINESS_MONTHLY_PRICE_USD
        value: "19.90"

databases:
  - name: ktalk-db
    plan: free
    databaseName: ktalk
    user: ktalk
