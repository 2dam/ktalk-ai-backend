# 운영/PostgreSQL 사용 시 (SPRING_PROFILES_ACTIVE=postgres)
# 배포 플랫폼(Render 등)의 Postgres 연결 정보를 환경변수로 주입한다.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ktalk}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# create-drop이면 재배포/재시작할 때마다 운영 데이터가 전부 삭제되므로,
# 기존 데이터는 유지하고 없는 테이블/컬럼만 추가하는 update로 설정
spring.jpa.hibernate.ddl-auto=update
