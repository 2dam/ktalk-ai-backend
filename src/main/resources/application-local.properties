# 로컬 개발용 파일 기반 DB (PostgreSQL 설치 없이 바로 실행 가능, 서버 재시작해도 데이터 유지)
spring.datasource.url=jdbc:h2:file:./data/ktalk;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# create-drop이면 재시작할 때마다 회원가입한 계정이 전부 사라지므로,
# 기존 데이터는 유지하고 없는 테이블/컬럼만 추가하는 update로 변경
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# http://localhost:8080/h2-console 에서 DB 내용 확인 가능 (JDBC URL: 위 spring.datasource.url 값)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
