spring.application.name=ktalk-ai-backend

# 활성 프로파일 (기본: local = H2 파일 DB, 설치 없이 바로 실행 가능)
# 운영 배포 시에는 SPRING_PROFILES_ACTIVE=postgres 로 지정
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# 배포 플랫폼(Render 등)이 할당하는 포트를 사용, 로컬은 8080
server.port=${PORT:8080}

# JPA
spring.jpa.show-sql=true

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8

# 음성 파일 업로드 크기 제한 (최대 20MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT (운영 배포 시 JWT_SECRET 환경변수로 반드시 별도 값 지정 - 기본값은 로컬 개발용)
jwt.secret=${JWT_SECRET:ktalk-super-secret-key-must-be-at-least-32-characters-long}
jwt.expiration-ms=86400000

# CORS 허용 origin (콤마로 여러 개 지정 가능, 운영 배포 시 실제 프론트엔드 도메인으로 설정)
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Google OAuth (.env 또는 환경변수로 실제 값을 주입, 없으면 더미 값으로 부팅만 되도록 기본값 지정)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# Gemini
gemini.api.key=${GEMINI_API_KEY:}

# App
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# YouTube
youtube.api.key=${YOUTUBE_API_KEY:}

# Stripe Billing
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Billing plans
billing.plan.free.monthly-ai-requests=${BILLING_FREE_MONTHLY_AI_REQUESTS:30}
billing.plan.pro.price-id=${STRIPE_PRO_PRICE_ID:}
billing.plan.pro.monthly-price-krw=${BILLING_PRO_MONTHLY_PRICE_KRW:9900}
billing.plan.pro.monthly-ai-requests=${BILLING_PRO_MONTHLY_AI_REQUESTS:1000}
billing.plan.business.price-id=${STRIPE_BUSINESS_PRICE_ID:}
billing.plan.business.monthly-price-krw=${BILLING_BUSINESS_MONTHLY_PRICE_KRW:29000}
billing.plan.business.monthly-ai-requests=${BILLING_BUSINESS_MONTHLY_AI_REQUESTS:5000}
