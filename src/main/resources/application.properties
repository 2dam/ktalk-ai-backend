spring.application.name=ktalk-ai-backend

# 활성 프로파일 (기본: local = H2 인메모리 DB, 설치 없이 바로 실행 가능)
# 운영 배포 시에는 SPRING_PROFILES_ACTIVE=postgres 로 지정
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA
spring.jpa.show-sql=true

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8

# 음성 파일 업로드 크기 제한 (최대 20MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT
jwt.secret=ktalk-super-secret-key-must-be-at-least-32-characters-long
jwt.expiration-ms=86400000

# Google OAuth (.env 또는 환경변수로 실제 값을 주입, 없으면 더미 값으로 부팅만 되도록 기본값 지정)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# Gemini
gemini.api.key=${GEMINI_API_KEY:}

# App
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# YouTube
youtube.api.key=${YOUTUBE_API_KEY:}
