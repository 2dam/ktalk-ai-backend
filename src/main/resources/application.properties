spring.application.name=ktalk-ai-backend

# 활성 프로파일 (기본: local = H2 파일 DB, 설치 없이 바로 실행 가능)
# 운영 배포 시에는 SPRING_PROFILES_ACTIVE=postgres 로 지정
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# 배포 플랫폼(Render 등)이 할당하는 포트를 사용, 로컬은 8080
server.port=${PORT:8080}

# Render 같은 리버스 프록시 뒤에서 돌 때 X-Forwarded-Proto/Host 헤더를 신뢰해서 실제
# 요청이 https였음을 인식하게 한다. 이게 없으면 서버가 내부적으로는 http 요청으로 보고
# OAuth2 redirect_uri를 http://로 만들어버려서, 구글 콘솔에 등록한 https:// URI와
# 문자열이 달라 "redirect_uri_mismatch" 오류가 난다.
server.forward-headers-strategy=framework

# JPA
spring.jpa.show-sql=true

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8

# 음성 파일 업로드 크기 제한 (최대 20MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT (운영 배포 시 JWT_SECRET 환경변수로 반드시 별도 값 지정 - 기본값은 로컬 개발용)
jwt.secret=${JWT_SECRET:ktalk-super-secret-key-must-be-at-least-32-characters-long}
jwt.expiration-ms=86400000

# CORS 허용 origin (콤마로 여러 개 지정 가능, 운영 배포 시 실제 프론트엔드 도메인으로 설정)
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Google OAuth (.env 또는 환경변수로 실제 값을 주입, 없으면 더미 값으로 부팅만 되도록 기본값 지정)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# Gemini
gemini.api.key=${GEMINI_API_KEY:}

# App
# 프론트가 백엔드와 같은 오리진에서 서빙되므로(Dockerfile이 빌드된 프론트를 static 리소스로 번들),
# Render 배포에서는 FRONTEND_URL을 따로 안 정해줘도 Render가 자동 주입하는 RENDER_EXTERNAL_URL로
# 폴백한다. 로컬 개발(Vite 별도 포트)에서만 localhost:5173이 필요하다.
app.frontend-url=${FRONTEND_URL:${RENDER_EXTERNAL_URL:http://localhost:5173}}

# YouTube
youtube.api.key=${YOUTUBE_API_KEY:}

# 국립국어원 우리말샘 오픈 API (단어 클릭 시 사전 뜻풀이 조회용)
# 발급: https://opendict.korean.go.kr/service/openApiRegister
opendict.api.key=${OPENDICT_API_KEY:}
